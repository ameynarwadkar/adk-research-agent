<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#grad)" stroke-width="2" stroke-opacity="0.2"/>
  <circle cx="50" cy="50" r="30" fill="url(#glow)"/>
  
  <!-- Central pipeline node -->
  <circle cx="50" cy="30" r="6" fill="url(#grad)" />
  
  <!-- Sub-agent nodes -->
  <circle cx="30" cy="60" r="5" fill="#818cf8" />
  <circle cx="50" cy="65" r="5" fill="#a78bfa" />
  <circle cx="70" cy="60" r="5" fill="#c084fc" />
  
  <!-- Connections -->
  <line x1="50" y1="30" x2="30" y2="60" stroke="#818cf8" stroke-width="1.5" stroke-opacity="0.7" />
  <line x1="50" y1="30" x2="50" y2="65" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.7" />
  <line x1="50" y1="30" x2="70" y2="60" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.7" />
  
  <line x1="30" y1="60" x2="50" y2="65" stroke="#818cf8" stroke-width="1" stroke-dasharray="2,2" stroke-opacity="0.5"/>
  <line x1="50" y1="65" x2="70" y2="60" stroke="#c084fc" stroke-width="1" stroke-dasharray="2,2" stroke-opacity="0.5"/>
</svg>
